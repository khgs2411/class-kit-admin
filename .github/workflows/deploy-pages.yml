name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_BASE_PATH: /class-kit-admin/
      VITE_SUPABASE_TARGET: remote
      VITE_REMOTE_SUPABASE_URL: https://xhkymcpkvekuvoxiucoe.supabase.co
      VITE_REMOTE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_jy5FhtJQh4mHLDrRMJ-JgQ_RxHSF1wm
      VITE_AUTH_REDIRECT_URL: https://khgs2411.github.io/class-kit-admin/
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure SDK deploy key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CLASS_KIT_SDK_DEPLOY_KEY }}" > ~/.ssh/class_kit_sdk
          chmod 600 ~/.ssh/class_kit_sdk
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git config --global core.sshCommand "ssh -i ~/.ssh/class_kit_sdk -o IdentitiesOnly=yes"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
