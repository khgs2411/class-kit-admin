name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_BASE_PATH: /class-kit-admin/
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify remote ClassKit SDK source
        run: |
          node -e 'const source = require("./package.json").dependencies["@class-kit/react"]; if (!/^git\+ssh:\/\/git@github\.com\/khgs2411\/class-kit-sdk\.git#v\d+\.\d+\.\d+$/.test(source)) { console.error("ClassKit Admin must pin a remote SDK release. Run make sdk-remote from the ClassKit root before deploying."); process.exit(1); }'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Configure SSH for private dependencies
        env:
          CLASS_KIT_SDK_DEPLOY_KEY: ${{ secrets.CLASS_KIT_SDK_DEPLOY_KEY }}
        run: |
          test -n "$CLASS_KIT_SDK_DEPLOY_KEY" || { echo "CLASS_KIT_SDK_DEPLOY_KEY secret is not set"; exit 1; }
          mkdir -p ~/.ssh
          printf '%s\n' "$CLASS_KIT_SDK_DEPLOY_KEY" > ~/.ssh/class_kit_sdk
          chmod 600 ~/.ssh/class_kit_sdk
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          git config --global core.sshCommand "ssh -i ~/.ssh/class_kit_sdk -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
